    <path d="M4 22L10 10L16 16L22 6" stroke="white" stroke-opacity="0.35" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Front arrow (primary, shifted right) -->
    <path d="M8 24L14 12L20 18L26 8" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Arrow head -->
    <path d="M22.5 8H26V11.5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Wordmark -->
  <text x="34" y="22" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="600" letter-spacing="-0.3" fill="white">
    <tspan>CopyTrade</tspan>
    <tspan fill="white" fill-opacity="0.5"> Pro</tspan>
  </text>
</svg>
